methodology_summary: >
  Implemented a highly optimized two-stage pipeline. The offline ETL phase processes 100K 
  candidates directly, using sentence-transformers to capture semantic experience and engineering 
  specific flags for honeypot traps and IT-services boundaries. The online inference ranking phase 
  leverages pure NumPy vector matrix math to extract high-recall matches in under 2 seconds, 
  avoiding memory overhead or runtime environment dependencies.